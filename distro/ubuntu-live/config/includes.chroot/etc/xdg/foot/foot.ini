# Pancake default terminal — foot
# Aero Glass colour palette

[main]
font=DejaVu Sans Mono:size=12
term=xterm-256color
shell=/bin/bash
login-shell=yes
initial-window-size-pixels=1100x650

[scrollback]
lines=10000

[url]
launch=xdg-open ${url}

[mouse]
hide-when-typing=yes

[colors]
# Translucent Aero background
alpha=0.88
background=0d1a33
foreground=cce4ff

# Normal colours
regular0=1a1a2e
regular1=e05c5c
regular2=5cc95c
regular3=e0c05c
regular4=5c9de0
regular5=9e5ce0
regular6=5cc9e0
regular7=c8d8f0

# Bright colours
bright0=2e3a5a
bright1=ff8080
bright2=80e080
bright3=ffe080
bright4=80c0ff
bright5=cc80ff
bright6=80e8ff
bright7=ffffff

# Selection
selection-foreground=ffffff
selection-background=3a5fa0

[cursor]
color=88c0ff 0d1a33

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
