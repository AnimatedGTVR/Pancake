# Pancake — Aero Glass desktop, built on Hyprland.
#
# This file is self-contained and does not depend on Omarchy or any other
# personal dotfiles setup — it's Pancake's own config, deployed as-is on the
# live ISO and on install. See https://wiki.hypr.land/Configuring/ for the
# general reference (this repo targets Hyprland 0.55.x hyprlang syntax, the
# still-current stable format — Hyprland's newer Lua config is documented as
# the future direction but hyprlang remains fully supported).
#
# Pancake is a floating-first desktop, not a tiling window manager: windows
# open floating by default (see the windowrule below); tiling is available
# per-window as an opt-in toggle (Super+T), matching classic Aero Glass UX
# rather than a dwindle/master tiling-first workflow.

monitor = , preferred, auto, 1

# ── Autostart ──────────────────────────────────────────────────────────────
# Hyprland's own exec-once replaces the old compositor's manual userland
# bootstrap (socket-poll + sequential launch) entirely.
exec-once = swaybg -i /etc/pancake/wallpapers/pancake-wallpaper-01.png -m fill
exec-once = dunst
exec-once = waybar
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = sleep 2 && notify-send --icon=dialog-information --urgency=low --expire-time=8000 "Welcome to Pancake" "Super+Enter: terminal  ·  Super+D: apps  ·  Super+Q: close\nSuper+T: toggle floating/tiling  ·  Super+Arrows: focus  ·  Super+Shift+Arrows: move window\nSuper+L: lock  ·  Print: screenshot  ·  Super+1-9: workspaces"

# ── Input ──────────────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}

# ── General ────────────────────────────────────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2

    # Soft blue border, matching the Aero Glass tint (was DEFAULT_TINT in the
    # old aero.rs shader: rgb(0.52, 0.68, 1.00)) — Hyprland's blur has no raw
    # color-tint parameter, so the blue tone comes from these borders plus a
    # blue-toned wallpaper showing through the blur, rather than a shader
    # tint layer like the old custom renderer had.
    col.active_border = rgba(85adffee) rgba(6a8fe6ee) 45deg
    col.inactive_border = rgba(2a2f3aaa)

    layout = dwindle
    resize_on_border = true
}

# ── Decoration — the Aero Glass look ───────────────────────────────────────
decoration {
    rounding = 10
    active_opacity = 0.98
    inactive_opacity = 0.92

    blur {
        enabled = true
        size = 8
        passes = 4
        vibrancy = 0.25
        contrast = 1.0
        noise = 0.01
        popups = true
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(1a1a2ecc)
    }
}

# ── Animations ─────────────────────────────────────────────────────────────
animations {
    enabled = true

    bezier = glass, 0.15, 0.9, 0.2, 1.05
    bezier = glassOut, 0.2, 0.9, 0.1, 1.0

    animation = windows, 1, 4, glass, popin 85%
    animation = windowsOut, 1, 4, glassOut, popin 85%
    animation = fade, 1, 4, default
    animation = border, 1, 6, default
    animation = workspaces, 1, 5, glass, slide
}

# ── Floating-first: every window opens floating, not tiled ────────────────
windowrule = float, match:class .*

# ── Keybinds ────────────────────────────────────────────────────────────────
$terminal = foot
$launcher = wofi --show drun

bindd = SUPER, RETURN, Open terminal, exec, $terminal
bindd = SUPER, D, App launcher, exec, $launcher
bindd = SUPER, Q, Close window, killactive,
bindd = SUPER, L, Lock screen, exec, swaylock
bindd = , Print, Screenshot, exec, grim -g "$(slurp)" - | wl-copy

# Opt-in tiling — toggles the FOCUSED window between floating and tiled,
# joining whatever dwindle layout is active. Not a workspace-wide mode
# switch (Hyprland has no exact equivalent to the old compositor's
# Super+Space workspace-tiling toggle) — this is the idiomatic Hyprland
# pattern and keeps floating as the default for every new window regardless.
bindd = SUPER, T, Toggle window floating/tiling, togglefloating,

bindd = SUPER, LEFT, Focus left, movefocus, l
bindd = SUPER, RIGHT, Focus right, movefocus, r
bindd = SUPER, UP, Focus up, movefocus, u
bindd = SUPER, DOWN, Focus down, movefocus, d

bindd = SUPER SHIFT, LEFT, Move window left, movewindow, l
bindd = SUPER SHIFT, RIGHT, Move window right, movewindow, r
bindd = SUPER SHIFT, UP, Move window up, movewindow, u
bindd = SUPER SHIFT, DOWN, Move window down, movewindow, d

bindd = SUPER, 1, Workspace 1, workspace, 1
bindd = SUPER, 2, Workspace 2, workspace, 2
bindd = SUPER, 3, Workspace 3, workspace, 3
bindd = SUPER, 4, Workspace 4, workspace, 4
bindd = SUPER, 5, Workspace 5, workspace, 5
bindd = SUPER, 6, Workspace 6, workspace, 6
bindd = SUPER, 7, Workspace 7, workspace, 7
bindd = SUPER, 8, Workspace 8, workspace, 8
bindd = SUPER, 9, Workspace 9, workspace, 9

bindd = SUPER SHIFT, 1, Move to workspace 1, movetoworkspace, 1
bindd = SUPER SHIFT, 2, Move to workspace 2, movetoworkspace, 2
bindd = SUPER SHIFT, 3, Move to workspace 3, movetoworkspace, 3
bindd = SUPER SHIFT, 4, Move to workspace 4, movetoworkspace, 4
bindd = SUPER SHIFT, 5, Move to workspace 5, movetoworkspace, 5
bindd = SUPER SHIFT, 6, Move to workspace 6, movetoworkspace, 6
bindd = SUPER SHIFT, 7, Move to workspace 7, movetoworkspace, 7
bindd = SUPER SHIFT, 8, Move to workspace 8, movetoworkspace, 8
bindd = SUPER SHIFT, 9, Move to workspace 9, movetoworkspace, 9

bindd = SUPER ALT, ESCAPE, Exit Pancake session, exit,

bindm = SUPER, mouse:272, Move window, movewindow
bindm = SUPER, mouse:273, Resize window, resizewindow
