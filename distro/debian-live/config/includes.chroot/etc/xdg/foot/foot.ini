# Pancake DE — foot terminal
# Aero Glass palette with warm amber cursor

[main]
font=Monospace:size=12
term=xterm-256color
shell=/bin/bash
login-shell=yes
initial-window-size-pixels=1100x660
pad=12x8

[scrollback]
lines=12000

[url]
launch=xdg-open ${url}

[mouse]
hide-when-typing=yes

[colors]
# Deep glass background, blue-white text
alpha=0.88
background=090f24
foreground=c8dcff

# Normal colours
regular0=14182e   # black
regular1=e05c64   # red
regular2=54c27a   # green
regular3=f0a830   # yellow — amber (Pancake brand)
regular4=5896e0   # blue
regular5=9e68e0   # magenta
regular6=50c8d8   # cyan
regular7=c0d4f0   # white

# Bright colours
bright0=2a3254    # bright black
bright1=ff8088    # bright red
bright2=78e096    # bright green
bright3=f5c148    # bright yellow — lighter amber
bright4=80b8ff    # bright blue
bright5=cc88ff    # bright magenta
bright6=80e4f4    # bright cyan
bright7=ffffff    # bright white

# Selection
selection-foreground=fffff8
selection-background=2e5090

[cursor]
color=f0a830 090f24
blink=yes

[key-bindings]
scrollback-up-page=Page_Up
scrollback-down-page=Page_Down
clipboard-copy=Control+Shift+c
clipboard-paste=Control+Shift+v
